# Nginx + Certbot example for the platform + tenant custom domains.
#
# Nginx does NOT issue certs on-demand like Caddy. Two supported patterns:
#
#  A) Platform host + wildcard subdomains  → one wildcard cert (DNS-01 challenge).
#  B) Tenant custom domains                → obtain a cert per domain with certbot
#     when the tenant verifies it (run the certbot command below, then reload).
#
# Prereqs: app on 127.0.0.1:3000, ports 80/443 open, certbot installed.

# ── Wildcard cert for the platform (DNS-01; needs a DNS plugin/API token) ──
#   sudo certbot certonly --dns-<provider> \
#     -d example.com -d '*.example.com' \
#     --agree-tos -m you@example.com --non-interactive

upstream cwk_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Shared proxy settings.
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# HTTP → HTTPS + ACME HTTP-01 challenge passthrough for custom domains.
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# Platform host + wildcard subdomains (tenant slugs).
server {
    listen 443 ssl;
    http2 on;
    server_name example.com *.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    location / {
        proxy_pass http://cwk_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ── Per tenant CUSTOM domain ──────────────────────────────────────────────
# When a tenant adds & verifies example-shop.com, issue a cert and reload:
#
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     -d example-shop.com -d www.example-shop.com \
#     --agree-tos -m you@example.com --non-interactive
#   sudo nginx -s reload
#
# Then add a server block (can be templated/automated):
#
# server {
#     listen 443 ssl;
#     http2 on;
#     server_name example-shop.com www.example-shop.com;
#     ssl_certificate     /etc/letsencrypt/live/example-shop.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/example-shop.com/privkey.pem;
#     location / {
#         proxy_pass http://cwk_app;
#         proxy_http_version 1.1;
#         proxy_set_header Host $host;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }
#
# TIP: For fully automatic tenant TLS without templating, use the Caddyfile in
# this folder instead — it issues certs on demand via the /api/tls-check gate.
