# Fly.io deployment. One machine (SQLite is single-writer) + one persistent
# volume mounted at /data for the DB and uploaded media.
#
#   fly launch --no-deploy      # creates the app (or: fly apps create <name>)
#   fly volumes create cwk_data --size 1 --region fra
#   fly secrets set SESSION_SECRET=... MUAPI_KEY=...        # your env
#   fly deploy
#
# Update NEXT_PUBLIC_APP_HOST to your real hostname (fly.dev subdomain or your
# Cloudflare domain) so tenant subdomains/links resolve correctly.

app = "builder-studio"
primary_region = "fra"

[build]
  # NEXT_PUBLIC_* are inlined into the client bundle at BUILD time (see
  # Dockerfile ARGs). Fly runtime secrets are too late for these, so set them
  # here (they are public, not secrets). Re-run `fly deploy` after changing.
  [build.args]
    NEXT_PUBLIC_APP_HOST = "builder-studio.fly.dev"
    NEXT_PUBLIC_MEDIA_BASE_URL = "https://pub-c7b94333a6814d959cfc04029d2925aa.r2.dev"
    # Serve tutorial media (videos/images) from R2 — your bucket public base,
    # NO trailing slash and NO /media (the app adds /media/...). Uncomment+fill:
    # NEXT_PUBLIC_MEDIA_BASE_URL = "https://pub-xxxxxxxx.r2.dev"
[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATABASE_FILE = "/data/app.db"
  NEXT_PUBLIC_APP_HOST = "builder-studio.fly.dev"

[[mounts]]
  source = "cwk_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Free-friendly: scale to zero when idle, wake on request. Remove these two
  # lines if you want it always-on (no cold starts).
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
